version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: cyber_postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword2026
      POSTGRES_DB: cybersecurity_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cybersecurity_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cyber_redis_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyber_fastapi_backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=ENTERPRISE_CYBERSECURITY_PLATFORM_SECRET_KEY_2026_TOKEN_SIGNING
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword2026
      - POSTGRES_DB=cybersecurity_platform
      - DATABASE_URL=postgresql://postgres:postgrespassword2026@db:5432/cybersecurity_platform
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY="" # Input OpenAI API Key for AI Advisor LLM
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyber_nextjs_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
